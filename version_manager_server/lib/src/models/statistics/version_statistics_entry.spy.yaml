### Статистика по одной версии приложения.
class: VersionStatisticsEntry
fields:
  ### ID версии (null, если версия не добавлена в список)
  versionId: UuidValue?
  ### Номер версии
  versionNumber: String
  ### Номер сборки
  buildNumber: int
  ### Количество уникальных пользователей (за период)
  userCount: int
  ### Процент от общего числа пользователей
  percentage: double
  ### Заблокирована ли версия
  isBlocked: bool
  ### Версия добавлена в список версий
  isRegistered: bool
  ### Дата создания версии
  createdAt: DateTime
  ### Возраст версии в днях (дней с момента создания)
  ageDays: int
