### Данные активности по дням.
class: DailyActiveUsersEntry
fields:
  ### Дата (YYYY-MM-DD)
  date: DateTime
  ### Общее количество уникальных пользователей за день
  totalUsers: int
  ### Уникальных пользователей за день (по fingerprint)
  activeUsers: int
  ### Новых пользователей за день
  newUsers: int
