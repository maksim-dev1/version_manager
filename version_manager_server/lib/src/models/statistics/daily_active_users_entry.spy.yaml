### Данные активности по дням.
class: DailyActiveUsersEntry
fields:
  ### Дата (YYYY-MM-DD)
  date: DateTime
  ### Общее количество запросов (входов) за день
  totalChecks: int
  ### Уникальных пользователей за день (по IDFV / App Instance ID)
  uniqueUsers: int
  ### Новых пользователей за день
  newUsers: int
