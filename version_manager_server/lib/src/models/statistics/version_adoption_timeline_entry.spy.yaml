### Точка временной шкалы adoption rate версии.
class: VersionAdoptionTimelineEntry
fields:
  ### Дата
  date: DateTime
  ### Номер версии
  versionNumber: String
  ### Номер сборки
  buildNumber: int
  ### Количество уникальных пользователей этой версии в этот день
  userCount: int
  ### Процент от общего числа пользователей в этот день
  percentage: double
