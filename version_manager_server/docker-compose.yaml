services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: version_manager
      POSTGRES_PASSWORD: "19ug4XMnouYL6WWXb0J328QPL3109_9m"
    volumes:
      - version_manager_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "a0N3BMjTbdUFutl5bba6vWm4ykLnADVP"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: version_manager_test
      POSTGRES_PASSWORD: "sVRi5HyAeeSVb9j7HRRNjLcFvAAicby0"
    volumes:
      - version_manager_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "Z9xmlBtHTTtqDkIJYzrzfQ-MLp40liC-"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  version_manager_data:
  version_manager_test_data:
