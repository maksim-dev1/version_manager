<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="version_manager_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Version Manager</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1C1C1E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ─── Floating background tags ─── */
    .bg-tags {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-tag {
      position: absolute;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      color: rgba(108, 92, 231, 0.12);
      white-space: nowrap;
      animation: float-tag linear infinite;
    }

    @keyframes float-tag {
      0% {
        transform: translateY(110vh) rotate(-8deg);
        opacity: 0;
      }

      5% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) rotate(8deg);
        opacity: 0;
      }
    }

    /* ─── Loading screen ─── */
    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* ─── Logo ─── */
    .logo-wrapper {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 32px;
    }

    .ring-outer {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(108, 92, 231, 0.15);
      border-top-color: rgba(108, 92, 231, 0.35);
      animation: spin 4s linear infinite reverse;
    }

    .ring-mid {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #6C5CE7;
      border-right-color: #0984E3;
      animation: spin 1.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .ring-inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px solid rgba(9, 132, 227, 0.2);
      border-bottom-color: rgba(9, 132, 227, 0.5);
      animation: spin 2.2s linear infinite;
    }

    .logo-core {
      position: absolute;
      inset: 14px;
      background: linear-gradient(135deg, #6C5CE7 0%, #0984E3 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(108, 92, 231, 0.4), 0 0 48px rgba(108, 92, 231, 0.15);
    }

    .logo-letter {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      line-height: 1;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ─── Texts ─── */
    .app-title {
      font-size: 22px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: -0.3px;
      margin-bottom: 36px;
      text-align: center;
    }

    /* ─── Progress ─── */
    .progress-wrapper {
      width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .progress-glow {
      position: absolute;
      top: 0;
      height: 100%;
      width: 55%;
      background: linear-gradient(90deg,
          transparent 0%,
          #6C5CE7 30%,
          #0984E3 70%,
          transparent 100%);
      border-radius: 99px;
      animation: progress-sweep 2s ease-in-out infinite;
    }

    @keyframes progress-sweep {
      0% {
        left: -55%;
      }

      100% {
        left: 100%;
      }
    }

    /* ─── Status messages ─── */
    .status-line {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 16px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #6C5CE7;
      flex-shrink: 0;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    #status-text {
      transition: opacity 0.35s ease;
    }

    .cursor {
      display: inline-block;
      width: 1px;
      height: 11px;
      background: rgba(108, 92, 231, 0.7);
      margin-left: 1px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* ─── Bottom version badge ─── */
    .bottom-badge {
      position: fixed;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.15);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .badge-divider {
      width: 20px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

  <!-- Floating version tags in background -->
  <div class="bg-tags" id="bg-tags"></div>

  <!-- Main loading screen -->
  <div id="loading-screen">

    <div class="logo-wrapper">
      <div class="ring-outer"></div>
      <div class="ring-mid"></div>
      <div class="ring-inner"></div>
      <div class="logo-core">
        <span class="logo-letter">v</span>
      </div>
    </div>

    <div class="app-title">Version Manager</div>

    <div class="progress-wrapper">
      <div class="progress-track">
        <div class="progress-glow"></div>
      </div>
      <div class="status-line">
        <div class="status-dot"></div>
        <span id="status-text">Initializing registry...</span><span class="cursor"></span>
      </div>
    </div>

    <div class="bottom-badge">
      <div class="badge-divider"></div>
      version manager
      <div class="badge-divider"></div>
    </div>

  </div>

  <script>
    // ── Background floating version tags ──
    const tags = [
      // versions
      'v1.0.0', 'v2.3.1', 'v0.9.4-beta', 'v3.0.0', 'v1.2.0-rc.1',
      'v4.1.2', 'v0.1.0', 'v2.0.0-alpha', 'v1.5.3', 'v3.2.0',
      'v5.0.0-rc.2', 'v1.9.0', 'v2.1.0-beta.3', 'v6.0.0', 'v0.3.7',
      // release states
      'released', 'stable', 'patch', 'minor', 'major',
      'CHANGELOG', 'semver', 'deploy', '→ v2.0', 'hotfix',
      'deprecated', 'archived', 'yanked', 'pre-release', 'nightly',
      // teams
      'team: frontend', 'team: backend', 'team: mobile',
      'team: devops', 'team: qa', 'team: design',
      '@alice', '@bob', '@carol', '@dev-team',
      // metrics
      'metrics', 'crash rate ↓', 'installs ↑', 'DAU',
      'retention 82%', 'ANR ↓', 'latency 120ms', 'uptime 99.9%',
      'sessions +14%', 'errors -32%', 'p99: 240ms', 'MAU 12k',
      // builds & pipeline
      'rollout 100%', 'rollout 25%', 'forced update',
      'build #142', 'build #87', 'pipeline: ok',
      'CI: passed', 'CD: deployed', 'artifact: ready',
      'docker push', 'git tag v2.0.0', 'npm publish',
    ];

    const container = document.getElementById('bg-tags');
    for (let i = 0; i < 42; i++) {
      const el = document.createElement('div');
      el.className = 'bg-tag';
      el.textContent = tags[i % tags.length];
      el.style.left = Math.random() * 100 + 'vw';
      const duration = 14 + Math.random() * 18;
      const delay = -(Math.random() * duration);
      el.style.animationDuration = duration + 's';
      el.style.animationDelay = delay + 's';
      container.appendChild(el);
    }

    // ── Cycling status messages ──
    const messages = [
      'Initializing registry...',
      'Resolving dependencies...',
      'Loading packages...',
      'Syncing release history...',
      'Fetching team workspaces...',
      'Loading metrics dashboard...',
      'Calculating crash rates...',
      'Preparing workspace...',
      'Connecting to server...',
      'Almost ready...',
    ];

    let msgIndex = 0;
    const statusEl = document.getElementById('status-text');
    statusEl.style.transition = 'opacity 0.35s ease';

    setInterval(function () {
      statusEl.style.opacity = '0';
      setTimeout(function () {
        msgIndex = (msgIndex + 1) % messages.length;
        statusEl.textContent = messages[msgIndex];
        statusEl.style.opacity = '1';
      }, 350);
    }, 2200);

    // ── Hide loader when Flutter fires its first frame ──
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('bg-tags').style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
